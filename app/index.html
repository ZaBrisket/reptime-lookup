<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RepTime Lookup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hdr">
    <h1>
      <span class="brand">REPTIME LOOKUP</span><span class="sep">//</span><span id="hdr-records">…</span><span class="sep">//</span><span class="ver">V2</span>
    </h1>
  </header>

  <main class="main">
    <div class="search-row">
      <span class="search-input-wrap">
        <input
          id="q"
          type="search"
          autocomplete="off"
          autofocus
          placeholder="QUERY: SUBMARINER 116610LN / DAYTONA / PATEK 5167 / PAM 005"
        />
      </span>
      <span id="count" class="count" aria-live="polite"></span>
    </div>

    <div id="banner" class="banner" hidden></div>

    <div class="layout-main">
      <aside id="filter-sidebar" class="filter-sidebar" hidden>
        <div class="filter-group">
          <label class="section-label">Sort By</label>
          <select id="sort-select" class="filter-input">
            <option value="relevance">Relevance</option>
            <option value="price_asc">Price: Low to High</option>
            <option value="price_desc">Price: High to Low</option>
            <option value="rank">Forum Rank</option>
          </select>
        </div>
        <div class="filter-group" style="margin-top: 16px;">
          <label class="section-label">Availability</label>
          <label class="checkbox-label">
            <input type="checkbox" id="in-stock-only"> In Stock Only
          </label>
        </div>
        <div class="filter-group" style="margin-top: 16px;">
          <label class="section-label">Price Range</label>
          <div style="display:flex; gap:8px;">
            <input type="number" id="price-min" class="filter-input" placeholder="Min $" style="width:100%">
            <input type="number" id="price-max" class="filter-input" placeholder="Max $" style="width:100%">
          </div>
        </div>
      </aside>

      <div class="layout-content">

    <!-- View 1: search results (when search box has text) -->
    <section id="results" class="results"></section>

    <!-- View 2: browse grid (default when search is empty) -->
    <section id="browse-view" class="browse-view" hidden>
      <div class="browse-toolbar">
        <h2 class="browse-title">Browse</h2>
        <div id="brand-chips" class="brand-chips"></div>
      </div>
      <div id="browse-summary" class="browse-summary" aria-live="polite"></div>
      <div id="family-grid" class="family-grid"></div>
    </section>

    <!-- View 3: family detail (clicked a card) -->
    <section id="family-detail" class="family-detail" hidden>
      <a href="#browse" class="back-link">← Back to browse</a>
      <div id="family-detail-body"></div>
    </section>

    <!-- View 4: watch detail -->
    <section id="watch-detail" class="watch-detail" hidden>
      <a href="#browse" id="watch-back-link" class="back-link">← Back</a>
      <div id="watch-detail-body"></div>
    </section>

    <!-- View 5: dealer detail -->
    <section id="dealer-detail" class="dealer-detail" hidden>
      <a href="#browse" class="back-link">← Back</a>
      <div id="dealer-detail-body"></div>
    </section>

    <!-- View 6: factory detail -->
    <section id="factory-detail" class="factory-detail" hidden>
      <a href="#browse" class="back-link">← Back</a>
      <div id="factory-detail-body"></div>
    </section>

    <!-- View 7: about -->
    <section id="about-page" class="about-page" hidden>
      <a href="#browse" class="back-link">← Back</a>
      <div id="about-page-body"></div>
    </section>

    <!-- View 7: compare -->
    <section id="compare-view" class="compare-view" hidden>
      <a href="#browse" class="back-link">← Back</a>
      <div id="compare-view-body" style="overflow-x: auto;"></div>
    </section>
      </div> <!-- /layout-content -->
    </div> <!-- /layout-main -->
  </main>

  <footer class="ftr">
    <span id="stats"></span>
    <a href="https://www.reddit.com/r/RepTime/wiki/index/" target="_blank" rel="noopener">r/RepTime wiki</a>
    <a href="https://reptime.help/" target="_blank" rel="noopener">reptime.help</a>
    <a href="#about">About</a>
  </footer>

  <script src="app.js" defer></script>
</body>
</html>
