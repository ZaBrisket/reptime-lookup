name: Weekly Catalog Scrape

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4
          playwright install --with-deps chromium

      - name: Run scraper
        run: |
          cd app
          python scrape_catalog.py
          # Copy over to the new Next.js app data directory
          cp dealer-catalog.json ../marketplace-web/src/data/dealer-catalog.json

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add app/dealer-catalog.json marketplace-web/src/data/dealer-catalog.json
          git commit -m "chore: auto-update dealer catalog" || echo "No changes to commit"
          git push
